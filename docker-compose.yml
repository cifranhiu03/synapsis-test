# Single-command bring-up for the Mine Fleet Live Tracker.
#
#   docker compose up --build
#
# Then open http://localhost:5173 — nginx serves the SPA and proxies /api
# (including the SSE stream) to the backend on the internal docker network.

services:
  backend:
    build:
      context: .
      dockerfile: docker/rust.Dockerfile
      args:
        BIN: fleet-backend
    environment:
      RUST_LOG: "info,fleet_backend=debug"
      BIND_ADDR: "0.0.0.0:8080"
    ports:
      - "8080:8080"
    healthcheck:
      # /dev/tcp is a bash-only feature; CMD-SHELL runs dash on slim
      # images, so we invoke bash explicitly. No curl/wget in the
      # runtime image keeps it small.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 5s
      timeout: 2s
      retries: 10

  sim:
    build:
      context: .
      dockerfile: docker/rust.Dockerfile
      args:
        BIN: fleet-sim
    environment:
      RUST_LOG: "info"
      BACKEND_URL: "http://backend:8080"
      TICK_HZ: "2"
      TRUCK_COUNT: "5"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "5173:80"
    depends_on:
      - backend
